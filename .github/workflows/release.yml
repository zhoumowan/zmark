name: Enterprise Release CI

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  PNPM_VERSION: 9.0.0

jobs:
# =========================
# 1. VERSION & RELEASE
# =========================
  release:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@users.noreply.github.com
        run: pnpm dlx semantic-release

      - name: Get version from git tag
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT


# =========================
# 2. BUILD MATRIX
# =========================
  build:
    needs: release
    if: needs.release.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      # =========================
      # Node + pnpm (稳定版)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      # =========================
      # pnpm cache（提速关键）
      # =========================
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # =========================
      # Rust
      # =========================
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # =========================
      # Linux deps
      # =========================
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # =========================
      # Install deps
      # =========================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # Build + Release (Tauri)
      # =========================
      - name: Build & Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: v${{ needs.release.outputs.version }}
          releaseName: "zmark v${{ needs.release.outputs.version }}"
          releaseBody: "Auto release by enterprise CI 🚀"
          releaseDraft: false
          prerelease: false

      # =========================
      # Upload artifact fallback（保险）
      # =========================
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: zmark-${{ matrix.target }}
          path: |
            src-tauri/target/**/release/bundle/**